function CityLights({ phase }) {
  const [lights, setLights] = useState([]);
  useEffect(() => {
    const arr = [];
    const count = phase === "tunnel" ? 30 : 15;
    for (let i = 0; i < count; i++) {
      arr.push({
        id: i, x: Math.random() * 100, y: Math.random() * 60 + 10,
        size: Math.random() * 3 + 1, speed: Math.random() * 20 + 10,
        delay: Math.random() * 5,
        color: phase === "tunnel"
          ? ["#44ff88","#4488ff","#ffffff","#ff4444"][Math.floor(Math.random()*4)]
          : ["#ffaa44","#ff8844","#ffcc66","#ffffff","#4488ff"][Math.floor(Math.random()*5)],
        opacity: Math.random() * 0.4 + 0.1,
      });
    }
    setLights(arr);
  }, [phase]);
  return (
    <div style={{ position:"fixed", inset:0, overflow:"hidden", pointerEvents:"none", zIndex:0 }}>
      {lights.map(l => (
        <div key={l.id} style={{
          position:"absolute", left:`${l.x}%`, top:`${l.y}%`,
          width:`${l.size}px`, height:`${l.size}px`, borderRadius:"50%",
          backgroundColor:l.color, opacity:l.opacity,
          boxShadow:`0 0 ${l.size*4}px ${l.color}`,
          animation:`drift ${l.speed}s linear ${l.delay}s infinite`,
        }} />
      ))}
    </div>
  );
}

function TypewriterText({ lines, sceneFlags, onComplete, onFlag, isEnding }) {
  const [displayedLines, setDisplayedLines] = useState([]);
  const [currentLine, setCurrentLine] = useState(0);
  const [currentChar, setCurrentChar] = useState(0);
  const [isComplete, setIsComplete] = useState(false);
  const [triggeredFlags, setTriggeredFlags] = useState([]);
  const containerRef = useRef(null);
  const userScrolledUp = useRef(false);

  const handleScroll = useCallback(() => {
    const el = containerRef.current;
    if (!el) return;
    const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    userScrolledUp.current = !nearBottom;
  }, []);

  useEffect(() => {
    setDisplayedLines([]); setCurrentLine(0); setCurrentChar(0);
    setIsComplete(false); setTriggeredFlags([]);
    userScrolledUp.current = false;
  }, [lines]);

  useEffect(() => {
    if (currentLine >= lines.length) { setIsComplete(true); onComplete?.(); return; }
    const line = lines[currentLine];
    if (currentChar >= line.length) {
      const idx = currentLine;
      setDisplayedLines(prev => [...prev, line]);
      const newFlags = (sceneFlags||[]).filter(f => f.afterLine === idx && !triggeredFlags.includes(f.id));
      if (newFlags.length > 0) {
        setTriggeredFlags(prev => [...prev, ...newFlags.map(f => f.id)]);
        newFlags.forEach(f => onFlag?.(FLAGS[f.id]));
      }
      setCurrentLine(prev => prev + 1); setCurrentChar(0);
      return;
    }
    const isDialogue = line.startsWith('"');
    const timer = setTimeout(() => setCurrentChar(prev => prev + 1), isDialogue ? 35 : 28);
    return () => clearTimeout(timer);
  }, [currentLine, currentChar, lines, onComplete, sceneFlags, triggeredFlags, onFlag]);

  useEffect(() => {
    if (containerRef.current && !userScrolledUp.current) {
      containerRef.current.scrollTop = containerRef.current.scrollHeight;
    }
  }, [displayedLines, currentChar, triggeredFlags]);

  const skipToEnd = () => {
    userScrolledUp.current = false;
    setDisplayedLines([...lines]);
    const allFlags = (sceneFlags||[]).filter(f => !triggeredFlags.includes(f.id));
    if (allFlags.length > 0) {
      setTriggeredFlags(prev => [...prev, ...allFlags.map(f => f.id)]);
      allFlags.forEach(f => onFlag?.(FLAGS[f.id]));
    }
    setCurrentLine(lines.length); setCurrentChar(0);
    setIsComplete(true); onComplete?.();
  };

  const isQuote = line => line.startsWith('"') || line.startsWith("◈");
  const isSystem = line => line.startsWith("◈") || line === "Two options beneath it: ATTEST or RIDE UNVERIFIED.";
  const isVerification = line => line.startsWith("Vehicle:") || line.startsWith("Voice interface:") || line.startsWith("Route:") || line.startsWith("Your attestation:") || line.startsWith("PANDO Constellation:") || line.startsWith("◈  AdID");
  const isSurveillance = line => {
    const triggers = [
      "Somewhere in the car", "Sentiment analysis", "In your pocket",
      "But your AdID", "But the AdID", "Behavioral advertising",
      "Before you reach the elevator", "engagement model", "Engagement protocol",
      "Engagement strategy", "behavioral model", "data brokers",
      "AdID profile", "AdID has", "AdID broadcast", "real-time bidding",
      "bid floor", "How did he know that? Or", "But your confession",
      "But here is the thing about frost", "But the glass will sell",
      "You thought you were talking to no one", "The PANDO Constellation told you the truth. But it told you too late",
      "Instead, you gave the car forty-two", "47 data brokers",
    ];
    return triggers.some(t => line.includes(t));
  };

  const rendered = [];
  for (let i = 0; i < displayedLines.length; i++) {
    const line = displayedLines[i];
    if (line.trim() === "") { rendered.push(<div key={`l-${i}`} style={{ height:"16px" }} />); }
    else {
      const quote = isQuote(line);
      const sys = isSystem(line);
      const ver = isVerification(line);
      const surv = isSurveillance(line);
      const isEndTag = line.startsWith("—") || line.startsWith("A fiction");
      rendered.push(
        <p key={`l-${i}`} style={{
          fontFamily: sys || ver || surv ? "'JetBrains Mono',monospace" : "'Spectral',Georgia,serif",
          fontSize: isEndTag ? "14px" : surv ? "11px" : ver ? "12px" : sys ? "13px" : quote ? "18px" : "16.5px",
          lineHeight: surv ? 1.65 : 1.75,
          color: isEndTag ? "#887766" : surv ? "#ff9933cc" : sys ? "#88ccaa" : ver ? "#88ccaa99" : quote ? "#e8d5c0" : "#b8a898",
          marginBottom: ver ? "4px" : surv ? "14px" : "14px",
          fontWeight: sys ? 400 : quote ? 400 : 300,
          letterSpacing: surv ? "0.03em" : sys || ver ? "0.06em" : quote ? "0.01em" : "0.02em",
          textAlign: isEndTag ? "center" : "left",
          opacity:0, animation:"fadeLineIn 0.4s ease forwards",
          paddingLeft: ver ? "20px" : surv ? "12px" : "0",
          borderLeft: surv ? "1px solid #ff993355" : "none",
        }}>{line}</p>
      );
    }
    const lineFlags = (sceneFlags||[]).filter(f => f.afterLine === i && triggeredFlags.includes(f.id));
    lineFlags.forEach((f,fi) => {
      rendered.push(<FlagMarker key={`f-${f.id}-${fi}`} flag={FLAGS[f.id]} isNew={true} onClick={flag => onFlag?.(flag, true)} />);
    });
  }

  return (
    <div ref={containerRef} onScroll={handleScroll} onClick={!isComplete ? skipToEnd : undefined}
      style={{ cursor:!isComplete?"pointer":"default", maxHeight:"55vh", overflowY:"auto", scrollbarWidth:"thin", scrollbarColor:"#88776633 transparent", paddingRight:"8px" }}>
      {rendered}
      {currentLine < lines.length && (
        <p style={{
          fontFamily: isSystem(lines[currentLine]) || isSurveillance(lines[currentLine]) ? "'JetBrains Mono',monospace" : "'Spectral',Georgia,serif",
          fontSize: isSurveillance(lines[currentLine]) ? "11px" : isSystem(lines[currentLine]) ? "13px" : isQuote(lines[currentLine]) ? "18px" : "16.5px",
          lineHeight: isSurveillance(lines[currentLine]) ? 1.65 : 1.75,
          color: isSurveillance(lines[currentLine]) ? "#ff9933cc" : isSystem(lines[currentLine]) ? "#88ccaa" : isQuote(lines[currentLine]) ? "#e8d5c0" : "#b8a898",
          marginBottom:"14px", fontWeight: isQuote(lines[currentLine]) ? 400 : 300,
          paddingLeft: isSurveillance(lines[currentLine]) ? "12px" : "0",
          borderLeft: isSurveillance(lines[currentLine]) ? "1px solid #ff993355" : "none",
        }}>
          {lines[currentLine].slice(0, currentChar)}
          <span style={{ display:"inline-block", width:"2px", height:"16px", backgroundColor:"#e8d5c066", marginLeft:"1px", verticalAlign:"text-bottom", animation:"blink 1s ease infinite" }} />
        </p>
      )}
    </div>
  );
}

        )}
        {/* Attest indicator */}
        {didAttest && !isEnding && (
          <div style={{
            position:"fixed", top:"16px", left:"50%", transform:"translateX(-50%)", zIndex:10,
            display:"flex", alignItems:"center", gap:"6px", padding:"4px 12px",
            animation:"fadeIn 0.5s ease",
          }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:"9px", color:"#88ccaa88", letterSpacing:"0.12em" }}>
              ◈ ATTESTED
            </span>
          </div>
        )}
        <div style={{
          position:"relative", zIndex:2, maxWidth:"640px", margin:"0 auto", width:"100%",
          paddingTop:"clamp(20px,5vh,60px)", flex:1, display:"flex", flexDirection:"column",
        }}>
          <div style={{
            fontFamily:"'Spectral',Georgia,serif", fontSize:"11px",
            color: isAttested ? "#44aaff77" : "#aa9988",
            letterSpacing:"0.2em", marginBottom:"24px", textTransform:"uppercase",
          }}>
            {phaseLabel()}
          </div>
          <div style={{ flex:1 }}>
            {scene && (
              <TypewriterText key={currentScene} lines={scene.text} sceneFlags={scene.flags||[]}
                isEnding={isEnding} onComplete={() => setTextComplete(true)}
                onFlag={(flag, showDetail) => handleFlag(flag, showDetail)} />
            )}
          </div>
          {textComplete && scene?.choices?.length > 0 && (
            <div style={{ marginTop:"32px", paddingTop:"24px", borderTop:"1px solid #aa885515", animation:"subtleSlide 0.6s ease forwards" }}>
              {scene.choices.map((choice, i) => {
                const isAttestChoice = choice.text === "Attest." || choice.text.startsWith("Tap ATTEST");
                return (
                  <button key={i} onClick={() => goToScene(choice.next)} style={{
                    display:"block", width:"100%", textAlign:"left",
                    fontFamily: isAttestChoice ? "'JetBrains Mono',monospace" : "'Spectral',Georgia,serif",
                    fontSize: isAttestChoice ? "13px" : "15px", fontWeight:300,
                    color: isAttestChoice ? "#88ccaa" : "#c8a878",
                    background:"transparent",
                    border: `1px solid ${isAttestChoice ? "#88ccaa25" : "#aa885520"}`,
                    borderRadius:"2px", padding:"14px 20px", marginBottom:"10px",
                    cursor:"pointer", letterSpacing: isAttestChoice ? "0.08em" : "0.02em",
                    transition:"all 0.3s ease", lineHeight:1.5,
                  }}
                  onMouseEnter={e => {
                    e.target.style.borderColor = isAttestChoice ? "#88ccaa55" : "#aa885555";
                    e.target.style.color = isAttestChoice ? "#aaeedd" : "#e8d5c0";
                    e.target.style.paddingLeft = "28px";
                    e.target.style.background = isAttestChoice ? "#88ccaa08" : "#aa885508";
                  }}
                  onMouseLeave={e => {
                    e.target.style.borderColor = isAttestChoice ? "#88ccaa25" : "#aa885520";
                    e.target.style.color = isAttestChoice ? "#88ccaa" : "#c8a878";
                    e.target.style.paddingLeft = "20px";
                    e.target.style.background = "transparent";
                  }}>
                    {isAttestChoice ? `◈ ${choice.text}` : choice.text}
                  </button>
                );
              })}
            </div>
          )}
          {textComplete && scene?.choices?.length === 0 && (
            <Debrief collectedFlags={collectedFlags} didAttest={didAttest} onRestart={restart} />
          )}
        </div>
      </div>
      <MusicLayer started={started} choicesMade={choicesMade} />
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<SomethingFamiliar />);
  </script>
</body>
</html>
